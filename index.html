<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekrutacja | AXO Logistyka</title>
    <link rel="icon" type="image/x-icon" href="Design/AXO_logo.ico">
    <style>
        :root {
            --axo-red: #e31212;
            --bg-dark: #121212;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .form-container {
            max-width: 700px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 4px solid var(--axo-red);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header img {
            max-width: 120px;
            margin-bottom: 15px;
        }

        .form-header h2 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-header h2 span {
            color: var(--axo-red);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.half {
            display: inline-block;
            width: 48%;
            vertical-align: top;
        }
        .form-group.half:nth-child(even) {
            margin-left: 3%;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--axo-red);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-upload-box {
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            background: #151515;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .file-upload-box:hover {
            border-color: var(--axo-red);
        }

        .preview-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .preview-container img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .btn-submit {
            background: var(--axo-red);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            width: 100%;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #b80f0f;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <img src="Design/AXO.png" alt="AXO Logo">
        <h2>Formularz Rekrutacyjny <span>AXO Logistyka</span></h2>
        <p style="color: var(--text-muted); font-size: 14px;">Wypełnij dokładnie wszystkie pola, aby zgłosić swoją kandydaturę.</p>
    </div>

    <form id="rekrutacjaForm" onsubmit="wyslijFormularz(event)">
        
        <!-- Podstawowe dane -->
        <div class="form-group half">
            <label for="imie">Imię:</label>
            <input type="text" id="imie" required placeholder="np. Jan">
        </div>

        <div class="form-group half">
            <label for="wiek">Wiek:</label>
            <input type="number" id="wiek" required min="1" max="99" placeholder="np. 18">
        </div>

        <div class="form-group">
            <label for="miasto">Miejscowość / Województwo:</label>
            <input type="text" id="miasto" required placeholder="np. Warszawa, Mazowieckie">
        </div>

        <!-- Discord i NOWY EMAIL -->
        <div class="form-group half">
            <label for="discord_nick">Nazwa użytkownika Discord (Nick):</label>
            <input type="text" id="discord_nick" required placeholder="np. k4ppyy">
        </div>

        <div class="form-group half">
            <label for="discord_id">Identyfikator Discord (ID płatka śniegu):</label>
            <input type="text" id="discord_id" required placeholder="np. 384829103948572910">
        </div>

        <div class="form-group">
            <label for="email">Adres E-mail (na ten adres otrzymasz wynik rekrutacji):</label>
            <input type="email" id="email" required placeholder="np. twoj-mail@gmail.com">
        </div>

        <!-- Gra -->
        <div class="form-group">
            <label for="godziny">Liczba godzin w ETS2 (na Steam):</label>
            <input type="number" id="godziny" required min="0" placeholder="np. 450">
        </div>

        <div class="form-group">
            <label for="steam">Link do profilu Steam (musi być publiczny):</label>
            <input type="url" id="steam" required placeholder="https://steamcommunity.com/id/twoj_profil">
        </div>

        <div class="form-group">
            <label for="trucksbook">Link do profilu TrucksBook (jeśli posiadasz):</label>
            <input type="url" id="trucksbook" placeholder="https://trucksbook.eu/profile/12345">
        </div>

        <div class="form-group half">
            <label for="promods">Czy posiadasz aktualny dodatek ProMods?</label>
            <select id="promods">
                <option value="Tak">Tak</option>
                <option value="Nie">Nie</option>
            </select>
        </div>

        <div class="form-group half">
            <label for="dds">Czy potrafisz wgrywać tekstury firmowe (DDS)?</label>
            <select id="dds">
                <option value="Tak">Tak</option>
                <option value="Nie">Nie</option>
                <option value="Uczę się">Uczę się</option>
            </select>
        </div>

        <!-- Pytania otwarte -->
        <div class="form-group">
            <label for="osobie">Napisz kilka zdań o sobie:</label>
            <textarea id="osobie" required placeholder="Czym się zajmujesz, jakie masz zainteresowania..."></textarea>
        </div>

        <div class="form-group">
            <label for="firmy">W jakich firmach (VTC) byłeś wcześniej?</label>
            <textarea id="firmy" placeholder="Nazwy firm, w których jeździłeś..."></textarea>
        </div>

        <div class="form-group">
            <label for="powod">Jaki był powód opuszczenia poprzednich firm?</label>
            <textarea id="powod" placeholder="Dlaczego odszedłeś lub zostałeś zwolniony..."></textarea>
        </div>

        <div class="form-group">
            <label for="dlaczego_my">Dlaczego chcesz dołączyć właśnie do AXO Logistyka?</label>
            <textarea id="dlaczego_my" required placeholder="Co przyciągnęło Cię do naszej firmy..."></textarea>
        </div>

        <div class="form-group">
            <label for="dlaczego_wybrac">Dlaczego to właśnie Ciebie powinniśmy wybrać?</label>
            <textarea id="dlaczego_wybrac" required placeholder="Twoje mocne strony, co wniesiesz do zespołu..."></textarea>
        </div>

        <div class="form-group">
            <label for="dlc">Jakie posiadasz DLC mapowe do ETS2? (Wymień wszystkie):</label>
            <textarea id="dlc" required placeholder="np. Going East, Scandinavia, Vive la France, Italia, Baltic, Black Sea, Iberia, West Balkans"></textarea>
        </div>

        <!-- Upload Zdjęć -->
        <div class="form-group">
            <label>Zdjęcia Twojej ciężarówki / profilu (Opcjonalnie):</label>
            <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                <p style="margin: 0; color: var(--text-muted);">Kliknij tutaj, aby dodać zdjęcia z gry</p>
                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            </div>
            <div class="preview-container" id="imagePreviewContainer"></div>
        </div>

        <button type="submit" class="btn-submit">Wyślij zgłoszenie</button>
    </form>
</div>

<script>
    let listaZdjec = [];

    // Funkcja do przetwarzania dodawanych zdjęć na format Base64
    function handleFileSelect(event) {
        const files = event.target.files;
        const container = document.getElementById('imagePreviewContainer');
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                listaZdjec.push(e.target.result);
                
                const img = document.createElement('img');
                img.src = e.target.result;
                container.appendChild(img);
            };
            reader.readAsDataURL(file);
        }
    }

    // GŁÓWNA FUNKCJA WYSYŁANIA DANYCH DO BACKENDU
    async function wyslijFormularz(event) {
        event.preventDefault();

        // Przygotowanie danych i wymuszenie czystych liczb za pomocą parseInt()
        const data = {
            imie: document.getElementById('imie').value.trim(),
            miasto: document.getElementById('miasto').value.trim(),
            discord_nick: document.getElementById('discord_nick').value.trim(),
            discord_id: document.getElementById('discord_id').value.trim(),
            email: document.getElementById('email').value.trim(), // Zbieranie adresu mailowego
            link_steam: document.getElementById('steam').value.trim(),
            link_trucksbook: document.getElementById('trucksbook').value.trim(),
            posiada_promods: document.getElementById('promods').value,
            podmiana_dds: document.getElementById('dds').value,
            o_sobie: document.getElementById('osobie').value.trim(),
            firms_wczesniej: document.getElementById('firmy').value.trim(),
            dlaczego_opuszczone: document.getElementById('powod').value.trim(),
            dlaczego_my: document.getElementById('dlaczego_my').value.trim(),
            dlaczego_ciebie: document.getElementById('dlaczego_wybrac').value.trim(),
            dlc_mapowe: document.getElementById('dlc').value.trim(),
            zdjecia: listaZdjec,
            
            // Konwersja na liczby – rozwiązuje błąd bazy danych (invalid input syntax for type integer)
            wiek: parseInt(document.getElementById('wiek').value, 10),
            godzin_ets2: parseInt(document.getElementById('godziny').value, 10)
        };

        // Dodatkowe zabezpieczenie walidacyjne na wypadek błędnego wpisania liczb
        if (isNaN(data.wiek) || isNaN(data.godzin_ets2)) {
            alert("Pola Wiek oraz Liczba godzin muszą zawierać poprawne cyfry!");
            return;
        }

        try {
            const response = await fetch('https://ets2-rekrutacja-backend.onrender.com/api/rekrutacja', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (result.success) {
                alert('Zgłoszenie rekrutacyjne zostało wysłane pomyślnie! Wynik otrzymasz na podany adres e-mail.');
                document.getElementById('rekrutacjaForm').reset();
                document.getElementById('imagePreviewContainer').innerHTML = '';
                listaZdjec = [];
            } else {
                alert('Wystąpił błąd po stronie serwera: ' + result.error);
            }
        } catch (error) {
            console.error('Błąd wysyłania:', error);
            alert('Nie udało się połączyć z serwerem rekrutacyjnym. Spróbuj ponownie później.');
        }
    }
</script>
</body>
</html>
