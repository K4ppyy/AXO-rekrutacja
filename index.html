<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekrutacja | AXO Logistyka</title>
    <link rel="icon" type="image/x-icon" href="Design/AXO_logo.ico">
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; text-align: center; }
        .form-container { max-width: 600px; margin: 0 auto; background: #1a1a1a; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-top: 4px solid #e31212; text-align: left; }
        .form-container img { display: block; margin: 0 auto 20px auto; max-width: 120px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group.half { display: inline-block; width: 48%; vertical-align: top; }
        .form-group.half:nth-child(even) { margin-left: 3%; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; background: #262626; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: #e31212; outline: none; }
        textarea { resize: vertical; height: 80px; }
        .file-upload { border: 2px dashed #444; padding: 20px; text-align: center; border-radius: 4px; background: #151515; cursor: pointer; }
        .file-upload:hover { border-color: #e31212; }
        .preview img { width: 80px; height: 60px; object-fit: cover; margin: 5px; border-radius: 4px; border: 1px solid #333; }
        button { background: #e31212; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 15px; }
        button:hover { background: #b80f0f; }
    </style>
</head>
<body>

<div class="form-container">
    <img src="Design/AXO.png" alt="AXO Logo">
    <h2 style="text-align: center; margin-top: 0; text-transform: uppercase;">Formularz Rekrutacyjny</h2>
    
    <form id="rekrutacjaForm" onsubmit="wyslijFormularz(event)">
        <div class="form-group half">
            <label>Imię:</label>
            <input type="text" id="imie" required placeholder="np. Jan">
        </div>
        <div class="form-group half">
            <label>Wiek:</label>
            <input type="number" id="wiek" required min="1" max="99" placeholder="np. 18">
        </div>

        <div class="form-group half">
            <label>Miejscowość / Województwo:</label>
            <input type="text" id="miasto" required placeholder="np. Warszawa">
        </div>
        <div class="form-group half">
            <label>Adres E-mail kandydata:</label>
            <input type="email" id="email" required placeholder="np. jan@gmail.com">
        </div>

        <div class="form-group half">
            <label>Discord Nick:</label>
            <input type="text" id="discord_nick" required placeholder="np. k4ppyy">
        </div>
        <div class="form-group half">
            <label>Discord ID:</label>
            <input type="text" id="discord_id" required placeholder="np. 384829103948572910">
        </div>

        <div class="form-group">
            <label>Godziny w ETS2:</label>
            <input type="number" id="godziny" required min="0" placeholder="np. 500">
        </div>

        <div class="form-group">
            <label>Profil Steam:</label>
            <input type="url" id="steam" required placeholder="https://steamcommunity.com/id/...">
        </div>

        <div class="form-group">
            <label>Profil TrucksBook:</label>
            <input type="url" id="trucksbook" placeholder="https://trucksbook.eu/profile/...">
        </div>

        <div class="form-group half">
            <label>ProMods?</label>
            <select id="promods">
                <option value="Tak">Tak</option>
                <option value="Nie">Nie</option>
            </select>
        </div>
        <div class="form-group half">
            <label>Ogarniasz DDS?</label>
            <select id="dds">
                <option value="Tak">Tak</option>
                <option value="Nie">Nie</option>
                <option value="Uczę się">Uczę się</option>
            </select>
        </div>

        <div class="form-group">
            <label>O sobie:</label>
            <textarea id="osobie" required></textarea>
        </div>

        <div class="form-group">
            <label>Poprzednie firmy:</label>
            <textarea id="firmy"></textarea>
        </div>

        <div class="form-group">
            <label>Powód odejścia:</label>
            <textarea id="powod"></textarea>
        </div>

        <div class="form-group">
            <label>Dlaczego AXO Logistyka?</label>
            <textarea id="dlaczego_my" required></textarea>
        </div>

        <div class="form-group">
            <label>Dlaczego Ty?</label>
            <textarea id="dlaczego_wybrac" required></textarea>
        </div>

        <div class="form-group">
            <label>Posiadane DLC Mapowe:</label>
            <textarea id="dlc" required placeholder="Wymień dlc mapowe..."></textarea>
        </div>

        <div class="form-group">
            <label>Zdjęcia z gry (Opcjonalnie):</label>
            <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                Kliknij, aby dodać zdjęcia
                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            </div>
            <div class="preview" id="imagePreviewContainer"></div>
        </div>

        <button type="submit">Wyślij zgłoszenie</button>
    </form>
</div>

<script>
    let listaZdjec = [];

    function handleFileSelect(event) {
        const files = event.target.files;
        const container = document.getElementById('imagePreviewContainer');
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                listaZdjec.push(e.target.result);
                const img = document.createElement('img');
                img.src = e.target.result;
                container.appendChild(img);
            };
            reader.readAsDataURL(file);
        }
    }

    async function wyslijFormularz(event) {
        event.preventDefault();
        const data = {
            imie: document.getElementById('imie').value.trim(),
            miasto: document.getElementById('miasto').value.trim(),
            email: document.getElementById('email').value.trim(),
            discord_nick: document.getElementById('discord_nick').value.trim(),
            discord_id: document.getElementById('discord_id').value.trim(),
            link_steam: document.getElementById('steam').value.trim(),
            link_trucksbook: document.getElementById('trucksbook').value.trim(),
            posiada_promods: document.getElementById('promods').value,
            podmiana_dds: document.getElementById('dds').value,
            o_sobie: document.getElementById('osobie').value.trim(),
            firms_wczesniej: document.getElementById('firmy').value.trim(),
            dlaczego_opuszczone: document.getElementById('powod').value.trim(),
            dlaczego_my: document.getElementById('dlaczego_my').value.trim(),
            dlaczego_ciebie: document.getElementById('dlaczego_wybrac').value.trim(),
            dlc_mapowe: document.getElementById('dlc').value.trim(),
            zdjecia: listaZdjec,
            wiek: parseInt(document.getElementById('wiek').value, 10),
            godzin_ets2: parseInt(document.getElementById('godziny').value, 10)
        };

        try {
            const response = await fetch('https://ets2-rekrutacja-backend.onrender.com/api/rekrutacja', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.success) {
                alert('Podanie wysłane pomyślnie!');
                document.getElementById('rekrutacjaForm').reset();
                document.getElementById('imagePreviewContainer').innerHTML = '';
                listaZdjec = [];
            } else {
                alert('Błąd: ' + result.error);
            }
        } catch (error) {
            console.error(error);
            alert('Błąd połączenia z serwerem.');
        }
    }
</script>
</body>
</html>
