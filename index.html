<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekrutacja | AXO Logistyka</title>
    
    <link rel="icon" type="image/x-icon" href="Design/AXO_logo.ico">
    
    <style>
        :root {
            --axo-red: #e31212;
            --bg-dark: #121212;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding: 40px 20px;
            margin: 0;
        }

        .container { 
            max-width: 650px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-top: 4px solid var(--axo-red);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            color: var(--text-main);
        }

        h1 span {
            color: var(--axo-red);
        }

        h3 { 
            color: var(--axo-red); 
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333; 
            padding-bottom: 8px; 
            margin-top: 35px;
            margin-bottom: 15px;
        }

        label { 
            display: block; 
            margin: 18px 0 6px; 
            font-weight: 600; 
            font-size: 14px;
            color: #e5e5e5;
        }

        input[type="text"], input[type="url"], textarea, select { 
            width: 100%; 
            padding: 12px; 
            background: var(--input-bg); 
            border: 1px solid #333; 
            color: var(--text-main); 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="url"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--axo-red);
            box-shadow: 0 0 5px rgba(227, 18, 18, 0.4);
        }

        textarea { 
            height: 110px; 
            resize: vertical; 
        }

        .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: -3px;
            margin-bottom: 8px;
            font-style: italic;
        }

        .dlc-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            background: #202020;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            margin-top: 5px;
        }

        .dlc-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }

        .dlc-item input {
            margin-right: 10px;
            width: auto;
            accent-color: var(--axo-red);
            transform: scale(1.2);
            cursor: pointer;
        }

        button { 
            background: var(--axo-red); 
            color: #fff; 
            border: none; 
            padding: 15px 20px; 
            font-size: 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 35px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s ease;
        }

        button:hover { 
            background: #b80f0f; 
        }

        input[type="file"] {
            padding: 10px;
            background: #1f1f1f;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #333;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="Design/AXO.png" alt="AXO Logistyka Logo">
    </div>
    
    <h1>System Rekrutacji <span>AXO Logistyka</span></h1>
    
    <form id="recruitmentForm">
        <h3>Podstawowe informacje</h3>
        
        <label>Imię:</label>
        <input type="text" name="imie" required placeholder="np. Jan">

        <label>Nick na Discordzie:</label>
        <input type="text" name="discord_nick" required placeholder="np. k4ppyy">

        <label>ID konta Discord:</label>
        <p class="note">Ciąg samych cyfr. Włącz Tryb Dewelopera w Discordzie, kliknij na swój profil i wybierz "Kopiuj ID użytkownika".</p>
        <input type="text" name="discord_id" required placeholder="np. 1336169894923993181">

        <label>Wiek:</label>
        <input type="text" name="wiek" required placeholder="np. 18">

        <label>Okolice / Miasto:</label>
        <input type="text" name="miasto" required placeholder="np. Warszawa">

        <h3>Informacje o sobie</h3>
        
        <label>Opowiedz coś o sobie (kilka zdań):</label>
        <textarea name="o_sobie" required placeholder="Napisz parę słów o sobie, zainteresowaniach..."></textarea>

        <label>Ile masz godzin w ETS2:</label>
        <input type="text" name="godzin_ets2" required placeholder="np. 450 godz.">

        <label>W jakich firmach wcześniej jeździłeś:</label>
        <textarea name="firmy_wczesniej" placeholder="Wymień poprzednie wirtualne firmy..."></textarea>

        <label>Dlaczego je opuściłeś:</label>
        <textarea name="dlaczego_opuszczone" placeholder="Podaj powód odejścia..."></textarea>

        <h3>Dodatki i weryfikacja</h3>
        
        <label>Czy posiadasz konto na TrucksBook?</label>
        <select name="posiada_trucksbook">
            <option>Tak</option>
            <option>Nie</option>
        </select>

        <label>Link do profilu TrucksBook:</label>
        <input type="url" name="link_trucksbook" placeholder="https://trucksbook.eu/company/...">

        <label>Link do profilu Steam:</label>
        <input type="url" name="link_steam" required placeholder="https://steamcommunity.com/profiles/...">

        <label>Czy posiadasz ProMods?</label>
        <select name="posiada_promods">
            <option>Tak</option>
            <option>Nie</option>
        </select>

        <label>Posiadane mapowe DLC:</label>
        <div class="dlc-container">
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Going East"> Going East!</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Scandinavia"> Scandinavia</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Vive la France"> Vive la France!</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Italia"> Italia</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Beyond the Baltic Sea"> Beyond the Baltic Sea</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Road to the Black Sea"> Road to the Black Sea</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Iberia"> Iberia</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="West Balkans"> West Balkans</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Greece"> Greece</label>
            <label class="dlc-item"><input type="checkbox" name="dlc" value="Nordic Horizons"> Nordic Horizons</label>
        </div>

        <label>Czy potrafisz podmienić plik DDS?</label>
        <select name="podmiana_dds">
            <option>Tak</option>
            <option>Nie</option>
            <option>Nie wiem o co chodzi</option>
        </select>

        <h3>Dlaczego AXO Logistyka?</h3>
        
        <label>Dlaczego chciałbyś dołączyć do naszej firmy?</label>
        <textarea name="dlaczego_my" required placeholder="Co Ci się u nas podoba?"></textarea>

        <label>Dlaczego powinniśmy wybrać właśnie Ciebie?</label>
        <textarea name="dlaczego_ciebie" required placeholder="Przekonaj nas do siebie!"></textarea>

        <h3>Dodatkowo</h3>
        
        <label>Wyślij zdjęcia z gry:</label>
        <p class="note">Minimalnie 3 zdjęcia</p>
        <input type="file" id="photosInput" multiple accept="image/*" required>

        <button type="submit" id="submitBtn">Wyślij Podanie rekrutacyjne</button>
    </form>
</div>

<script>
    const BACKEND_URL = 'https://ets2-rekrutacja-backend.onrender.com';

    // Funkcja kompresująca zdjęcia przed wysyłką, aby nie zatykać bazy danych
    const resizeAndCompressImage = (file) => new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1024; // Zmniejszamy szerokość do max 1024px
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Zapisujemy jako JPEG o jakości 60% (ogromna oszczędność wagi, świetna jakość tekstowa)
                const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                resolve(dataUrl);
            };
        };
    });

    document.getElementById('recruitmentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const files = document.getElementById('photosInput').files;
        const submitBtn = document.getElementById('submitBtn');
        
        if (files.length < 3) {
            alert('Prosimy o dodanie minimalnie 3 zdjęć z gry!');
            return;
        }
        
        try {
            submitBtn.disabled = true;
            submitBtn.innerText = 'Wysyłanie i kompresja zdjęć...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Mapowanie listy DLC
            const checkedDLCs = [];
            document.querySelectorAll('input[name="dlc"]:checked').forEach(cb => {
                checkedDLCs.push(cb.value);
            });
            
            const dlcString = checkedDLCs.length > 0 ? checkedDLCs.join(', ') : 'Brak mapowych DLC';
            data.dlc = dlcString;
            data.dlc_mapowe = dlcString; // Na wszelki wypadek wysyłamy w obu wariantach nazw kolumn

            // Kompresja i przetwarzanie zdjęć
            const encodedPhotos = [];
            for (let i = 0; i < files.length; i++) {
                const compressedBase64 = await resizeAndCompressImage(files[i]);
                encodedPhotos.push(compressedBase64);
            }
            data.zdjecia = encodedPhotos.join('|');

            const response = await fetch(`${BACKEND_URL}/api/rekrutacja`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (result.success) {
                alert('Sukces! Twoje podanie do AXO Logistyka zostało wysłane pomyślnie.');
                e.target.reset();
            } else {
                alert('Serwer odrzucił dane: ' + (result.error || 'Nieznany błąd struktury bazy danych.'));
            }
        } catch (error) {
            alert('Błąd połączenia z serwerem AXO. Spróbuj ponownie za chwilę.');
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Wyślij Podanie rekrutacyjne';
        }
    });
</script>
</body>
</html>
