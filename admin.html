<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora | AXO Logistyka</title>
    <link rel="icon" type="image/x-icon" href="Design/AXO_logo.ico">
    <style>
        :root {
            --axo-red: #e31212;
            --bg-dark: #121212;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --status-pending: #f1c40f;
            --status-accepted: #2ecc71;
            --status-rejected: #e74c3c;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 20px; margin: 0; }
        
        #loginBlocker { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border-top: 4px solid var(--axo-red); text-align: center; width: 100%; max-width: 380px; }
        .login-box input[type="password"] { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; margin-bottom: 20px; font-size: 16px; text-align: center; }

        #adminMainContent { display: none; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--axo-red); padding-bottom: 20px; margin-bottom: 30px; }
        
        .applications-list { display: flex; flex-direction: column; gap: 15px; }
        .app-item { background: var(--card-bg); border-radius: 8px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        
        /* Modal i Zdjęcia */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 30px; border-top: 4px solid var(--axo-red); position: relative; }
        
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 10px; }
        .photo-gallery img { width: 100%; height: 200px; object-fit: contain; background-color: #000; border-radius: 6px; cursor: pointer; border: 1px solid #333; transition: transform 0.2s; }
        .photo-gallery img:hover { transform: scale(1.02); }

        .btn-view, .btn-login, .btn-decision { background: var(--axo-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .oczekuje { background: rgba(241, 196, 15, 0.2); color: var(--status-pending); }
        .zaakceptowane { background: rgba(46, 204, 113, 0.2); color: var(--status-accepted); }
        .odrzucone { background: rgba(231, 76, 60, 0.2); color: var(--status-rejected); }
    </style>
</head>
<body>

<div id="loginBlocker">
    <div class="login-box">
        <h2 style="text-transform: uppercase;">PANEL LOGOWANIA</h2>
        <input type="password" id="adminPassword" placeholder="Wpisz hasło">
        <button class="btn-login" onclick="checkLogin()">Zaloguj się</button>
    </div>
</div>

<div id="adminMainContent">
    <header>
        <h1>Panel Administracyjny AXO</h1>
        <button class="btn-view" onclick="fetchApplications()">Odśwież dane</button>
    </header>
    <div class="applications-list" id="appsListContainer"></div>
</div>

<div class="modal" id="appModal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeModal()">&times;</span>
        <h2>Szczegóły podania</h2>
        <div id="m-content"></div>
        <div class="photo-gallery" id="m-galeria"></div>
        <div id="m-actions" style="margin-top:20px; display:flex; gap:10px;"></div>
    </div>
</div>

<script>
    const BACKEND_URL = 'https://ets2-rekrutacja-backend.onrender.com';
    let allApplications = [], savedPassword = "";

    function checkLogin() {
        savedPassword = document.getElementById('adminPassword').value;
        document.getElementById('loginBlocker').style.display = 'none';
        document.getElementById('adminMainContent').style.display = 'block';
        fetchApplications();
    }

    async function fetchApplications() {
        const res = await fetch(`${BACKEND_URL}/api/rekrutacja`, { headers: { 'Authorization': `Bearer ${savedPassword}` } });
        const { data } = await res.json();
        allApplications = data;
        const container = document.getElementById('appsListContainer');
        container.innerHTML = data.map(app => `
            <div class="app-item">
                <div><strong>${app.imie}</strong> - ${app.discord_nick}</div>
                <div class="app-actions">
                    <span class="status-badge ${app.status}">${app.status}</span>
                    <button class="btn-view" onclick="openModal('${app.id}')">Zobacz</button>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) {
        const app = allApplications.find(a => String(a.id) === String(id));
        document.getElementById('m-content').innerHTML = `<div>Nick: ${app.discord_nick}</div><div>Godziny: ${app.godzin_ets2}</div>`;
        const galeria = document.getElementById('m-galeria'); galeria.innerHTML = '';
        if (app.zdjecia) {
            (Array.isArray(app.zdjecia) ? app.zdjecia : [app.zdjecia]).forEach(src => {
                if (src.startsWith('data:image')) {
                    const img = document.createElement('img'); img.src = src;
                    img.onclick = () => window.open(src, '_blank');
                    galeria.appendChild(img);
                }
            });
        }
        document.getElementById('appModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('appModal').style.display = 'none'; }
</script>
</body>
</html>
