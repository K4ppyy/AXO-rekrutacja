<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora | AXO Logistyka</title>
    <link rel="icon" type="image/x-icon" href="Design/AXO_logo.ico">
    <style>
        :root {
            --axo-red: #e31212;
            --bg-dark: #121212;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --status-pending: #f1c40f;
            --status-accepted: #2ecc71;
            --status-rejected: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding: 20px;
            margin: 0;
        }

        #loginBlocker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-top: 4px solid var(--axo-red);
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        .login-box img {
            max-width: 120px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
        }

        #adminMainContent {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--axo-red);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area img {
            max-width: 50px;
            height: auto;
            border-radius: 6px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 span { color: var(--axo-red); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--text-muted);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-card.total { border-left-color: var(--text-main); }
        .stat-card.pending { border-left-color: var(--status-pending); }
        .stat-card.accepted { border-left-color: var(--status-accepted); }
        .stat-card.rejected { border-left-color: var(--status-rejected); }

        .stat-card h4 { margin: 0 0 5px 0; color: var(--text-muted); text-transform: uppercase; font-size: 12px; }
        .stat-card .number { font-size: 28px; font-weight: bold; }

        .controls {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .search-input, .filter-select {
            background: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-input { width: 300px; }

        .applications-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .app-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
            border: 1px solid #222;
        }

        .app-item:hover {
            transform: translateX(5px);
            border-color: #444;
        }

        .app-info h3 { margin: 0 0 8px 0; font-size: 18px; }
        .app-info p { margin: 4px 0; color: var(--text-muted); font-size: 14px; }
        .app-info .meta-tags { display: flex; gap: 15px; margin-top: 8px; }
        .meta-tags span { background: #262626; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        .app-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-badge.oczekuje { background: rgba(241, 196, 15, 0.2); color: var(--status-pending); }
        .status-badge.zaakceptowane { background: rgba(46, 204, 113, 0.2); color: var(--status-accepted); }
        .status-badge.odrzucone { background: rgba(231, 76, 60, 0.2); color: var(--status-rejected); }

        .btn-view, .btn-login {
            background: var(--axo-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-view:hover, .btn-login:hover { background: #b80f0f; }
        .btn-login { width: 100%; padding: 12px; text-transform: uppercase; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: 30px;
            border-top: 4px solid var(--axo-red);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 28px; color: var(--text-muted);
            cursor: pointer;
        }
        .close-modal:hover { color: #fff; }

        .modal-section {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .modal-section h4 { color: var(--axo-red); margin: 0 0 10px 0; text-transform: uppercase; }
        
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .data-field { margin-bottom: 10px; }
        .data-field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
        .data-field div { font-size: 15px; }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .photo-gallery img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        .photo-gallery img:hover { transform: scale(1.05); }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-decision {
            padding: 12px 25px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-accept { background: var(--status-accepted); color: #fff; }
        .btn-reject { background: var(--status-rejected); color: #fff; }
    </style>
</head>
<body>

<div id="loginBlocker">
    <div class="login-box">
        <img src="Design/AXO.png" alt="AXO Logo">
        <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 20px; text-transform: uppercase;">PANEL LOGOWANIA</h2>
        <input type="password" id="adminPassword" placeholder="Wpisz hasło administratora" onkeypress="handleKeyPress(event)">
        <button class="btn-login" onclick="checkLogin()">Zaloguj się</button>
    </div>
</div>

<div id="adminMainContent">
    <header>
        <div class="logo-area">
            <img src="Design/AXO.png" alt="AXO Logo">
            <h1>Panel Zarządzania <span>AXO Logistyka</span></h1>
        </div>
        <button class="btn-view" onclick="fetchApplications()">Odśwież</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card total">
            <h4>Wszystkie podania</h4>
            <div class="number" id="stat-total">0</div>
        </div>
        <div class="stat-card pending">
            <h4>Oczekujące</h4>
            <div class="number" id="stat-pending">0</div>
        </div>
        <div class="stat-card accepted">
            <h4>Zaakceptowane</h4>
            <div class="number" id="stat-accepted">0</div>
        </div>
        <div class="stat-card rejected">
            <h4>Odrzucone</h4>
            <div class="number" id="stat-rejected">0</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" class="search-input" id="searchBar" placeholder="Szukaj po nicku lub imieniu..." oninput="filterApplications()">
        <select class="filter-select" id="statusFilter" onchange="filterApplications()">
            <option value="wszystkie">Wszystkie statusy</option>
            <option value="oczekuje">Oczekujące</option>
            <option value="zaakceptowane">Zaakceptowane</option>
            <option value="odrzucone">Odrzucone</option>
        </select>
    </div>

    <div class="applications-list" id="appsListContainer">
        <p style="text-align: center; color: var(--text-muted);">Ładowanie podań rekrutacyjnych...</p>
    </div>
</div>

<div class="modal" id="appModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 style="margin-top:0; margin-bottom: 20px;">Szczegóły Podania rekrutacyjnego</h2>
        
        <div class="modal-section grid-2col">
            <div class="data-field"><label>Imię i Wiek</label><div id="m-imie-wiek"></div></div>
            <div class="data-field"><label>Lokalizacja</label><div id="m-miasto"></div></div>
            <div class="data-field"><label>Discord Nick</label><div id="m-discord-nick" style="color: var(--status-pending); font-weight: bold;"></div></div>
            <div class="data-field"><label>Discord ID</label><div id="m-discord-id"></div></div>
        </div>

        <div class="modal-section grid-2col">
            <div class="data-field"><label>Godziny ETS2</label><div id="m-godziny"></div></div>
            <div class="data-field"><label>Profil Steam</label><div><a id="m-steam" href="#" target="_blank" style="color: #3498db;">Otwórz profil</a></div></div>
            <div class="data-field"><label>TrucksBook</label><div><a id="m-tb" href="#" target="_blank" style="color: #3498db;">Otwórz TrucksBook</a></div></div>
            <div class="data-field"><label>ProMods / DDS</label><div id="m-promods-dds"></div></div>
        </div>

        <div class="modal-section">
            <div class="data-field"><label>Opis o sobie</label><div id="m-osobie"></div></div>
            <div class="data-field" style="margin-top: 10px;"><label>Poprzednie firmy i powód odejścia</label><div id="m-firmy"></div></div>
        </div>

        <div class="modal-section">
            <div class="data-field"><label>Dlaczego AXO i dlaczego on?</label><div id="m-dlaczego"></div></div>
            <div class="data-field" style="margin-top: 10px;"><label>Posiadane DLC Mapowe</label><div id="m-dlc"></div></div>
        </div>

        <div class="modal-section">
            <h4>Zdjęcia z gry</h4>
            <div class="photo-gallery" id="m-galeria"></div>
        </div>

        <div class="modal-actions" id="modalActionButtons"></div>
    </div>
</div>

<script>
    const BACKEND_URL = 'https://ets2-rekrutacja-backend.onrender.com';
    let allApplications = [];
    let savedPassword = "";

    function checkLogin() {
        const passwordInput = document.getElementById('adminPassword').value.trim();
        if(passwordInput === "") {
            alert("Hasło nie może być puste!");
            return;
        }
        savedPassword = passwordInput;
        document.getElementById('loginBlocker').style.display = 'none';
        document.getElementById('adminMainContent').style.display = 'block';
        fetchApplications();
    }

    function handleKeyPress(e) {
        if(e.key === 'Enter') { checkLogin(); }
    }

    async function fetchApplications() {
        const container = document.getElementById('appsListContainer');
        try {
            const response = await fetch(`${BACKEND_URL}/api/rekrutacja`, {
                headers: { 'Authorization': `Bearer ${savedPassword}` }
            });

            if (!response.ok) {
                if(response.status === 403 || response.status === 401) {
                    throw new Error("Błędne hasło administratora! Zrestartuj stronę i spróbuj ponownie.");
                }
                throw new Error(`Serwer zwrócił błąd statusu: ${response.status}`);
            }

            const result = await response.json();
            if(result.success) {
                allApplications = result.data || [];
                updateStats();
                renderApplications(allApplications);
