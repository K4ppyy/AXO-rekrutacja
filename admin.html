<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administratora | AXO Logistyka</title>
    <link rel="icon" type="image/x-icon" href="Design/AXO_logo.ico">
    <style>
        :root {
            --axo-red: #e31212;
            --bg-dark: #121212;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --status-pending: #f1c40f;
            --status-accepted: #2ecc71;
            --status-rejected: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding: 20px;
            margin: 0;
        }

        #loginBlocker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-top: 4px solid var(--axo-red);
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        .login-box img {
            max-width: 120px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
        }

        #adminMainContent {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--axo-red);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area img {
            max-width: 50px;
            height: auto;
            border-radius: 6px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 span { color: var(--axo-red); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--text-muted);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-card.total { border-left-color: var(--text-main); }
        .stat-card.pending { border-left-color: var(--status-pending); }
        .stat-card.accepted { border-left-color: var(--status-accepted); }
        .stat-card.rejected { border-left-color: var(--status-rejected); }

        .stat-card h4 { margin: 0 0 5px 0; color: var(--text-muted); text-transform: uppercase; font-size: 12px; }
        .stat-card .number { font-size: 28px; font-weight: bold; }

        .controls {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .search-input, .filter-select {
            background: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-input { width: 300px; }

        .applications-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .app-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
            border: 1px solid #222;
        }

        .app-item:hover {
            transform: translateX(5px);
            border-color: #444;
        }

        .app-info h3 { margin: 0 0 8px 0; font-size: 18px; }
        .app-info p { margin: 4px 0; color: var(--text-muted); font-size: 14px; }
        .app-info .meta-tags { display: flex; gap: 15px; margin-top: 8px; }
        .meta-tags span { background: #262626; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        .app-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-badge.oczekuje { background: rgba(241, 196, 15, 0.2); color: var(--status-pending); }
        .status-badge.zaakceptowane { background: rgba(46, 204, 113, 0.2); color: var(--status-accepted); }
        .status-badge.odrzucone { background: rgba(231, 76, 60, 0.2); color: var(--status-rejected); }

        .btn-view, .btn-login {
            background: var(--axo-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-view:hover, .btn-login:hover { background: #b80f0f; }
        .btn-login { width: 100%; padding: 12px; text-transform: uppercase; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: 30px;
            border-top: 4px solid var(--axo-red);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 28px; color: var(--text-muted);
            cursor: pointer;
        }
        .close-modal:hover { color: #fff; }

        .modal-section {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .modal-section h4 { color: var(--axo-red); margin: 0 0 10px 0; text-transform: uppercase; }
