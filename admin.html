<script>
    const BACKEND_URL = 'https://ets2-rekrutacja-backend.onrender.com';
    let allApplications = [];
    let savedPassword = "";

    function checkLogin() {
        const passwordInput = document.getElementById('adminPassword').value.trim();
        if(passwordInput === "") {
            alert("Hasło nie może być puste!");
            return;
        }
        savedPassword = passwordInput;
        document.getElementById('loginBlocker').style.display = 'none';
        document.getElementById('adminMainContent').style.display = 'block';
        fetchApplications();
    }

    function handleKeyPress(e) {
        if(e.key === 'Enter') { checkLogin(); }
    }

    async function fetchApplications() {
        const container = document.getElementById('appsListContainer');
        try {
            const response = await fetch(`${BACKEND_URL}/api/rekrutacja`, {
                headers: { 'Authorization': `Bearer ${savedPassword}` }
            });

            if (!response.ok) {
                if(response.status === 403 || response.status === 401) {
                    throw new Error("Błędne hasło administratora!");
                }
                throw new Error(`Błąd statusu: ${response.status}`);
            }

            const result = await response.json();
            if(result.success) {
                allApplications = result.data || [];
                updateStats();
                renderApplications(allApplications);
            } else {
                alert('Błąd serwera: ' + result.error);
            }
        } catch (error) {
            console.error(error);
            container.innerHTML = `<p style="text-align: center; color: var(--status-rejected); font-weight: bold;">${error.message}</p>`;
        }
    }

    function updateStats() {
        document.getElementById('stat-total').innerText = allApplications.length;
        document.getElementById('stat-pending').innerText = allApplications.filter(a => a.status === 'oczekuje').length;
        document.getElementById('stat-accepted').innerText = allApplications.filter(a => a.status === 'zaakceptowane').length;
        document.getElementById('stat-rejected').innerText = allApplications.filter(a => a.status === 'odrzucone').length;
    }

    function renderApplications(apps) {
        const container = document.getElementById('appsListContainer');
        container.innerHTML = '';
        if(apps.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Brak podań w bazie.</p>';
            return;
        }
        apps.forEach(app => {
            const item = document.createElement('div');
            item.className = 'app-item';
            item.innerHTML = `
                <div class="app-info">
                    <h3>${app.imie} (${app.wiek} l.)</h3>
                    <p>Discord: <strong>${app.discord_nick}</strong></p>
                </div>
                <div class="app-actions">
                    <span class="status-badge ${app.status}">${app.status}</span>
                    <button class="btn-view" onclick="openModal('${app.id}')">Zobacz</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function filterApplications() {
        const searchText = document.getElementById('searchBar').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        const filtered = allApplications.filter(app => {
            const matchesSearch = (app.discord_nick && app.discord_nick.toLowerCase().includes(searchText)) || (app.imie && app.imie.toLowerCase().includes(searchText));
            const matchesStatus = statusFilter === 'wszystkie' || app.status === statusFilter;
            return matchesSearch && matchesStatus;
        });
        renderApplications(filtered);
    }

    function openModal(id) {
        const app = allApplications.find(a => String(a.id) === String(id));
        if(!app) return;

        document.getElementById('m-imie-wiek').innerText = `${app.imie} (${app.wiek} lat)`;
        document.getElementById('m-miasto').innerText = app.miasto || '';
        document.getElementById('m-discord-nick').innerText = app.discord_nick || '';
        document.getElementById('m-discord-id').innerText = app.discord_id || '';
        document.getElementById('m-godziny').innerText = app.godzin_ets2 || '';
        document.getElementById('m-steam').href = app.link_steam || '#';
        document.getElementById('m-tb').href = app.link_trucksbook || '#';
        document.getElementById('m-promods-dds').innerText = `ProMods: ${app.posiada_promods} | DDS: ${app.podmiana_dds}`;
        document.getElementById('m-osobie').innerText = app.o_sobie || '';
        document.getElementById('m-firmy').innerText = app.firmy_wczesniej || '';
        document.getElementById('m-dlaczego').innerText = app.dlaczego_my || '';
        document.getElementById('m-dlc').innerText = app.dlc_mapowe || '';

        const actionsDiv = document.getElementById('modalActionButtons');
        actionsDiv.innerHTML = '';
        if(app.status === 'oczekuje') {
            actionsDiv.innerHTML = `
                <button class="btn-decision btn-reject" onclick="changeStatus('${app.id}', 'odrzucone')">Odrzuć</button>
                <button class="btn-decision btn-accept" onclick="changeStatus('${app.id}', 'zaakceptowane')">Zaakceptuj</button>
            `;
        } else {
            actionsDiv.innerHTML = `<span>Status: ${app.status}</span>`;
        }
        document.getElementById('appModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('appModal').style.display = 'none'; }

    async function changeStatus(id, newStatus) {
        if(!confirm(`Zmienić status na ${newStatus}?`)) return;
        try {
            const response = await fetch(`${BACKEND_URL}/api/rekrutacja/${id}`, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${savedPassword}`
                },
                body: JSON.stringify({ status: newStatus })
            });
            if(response.ok) {
                closeModal();
                fetchApplications();
            }
        } catch (error) {
            alert('Błąd: ' + error.message);
        }
    }
</script>
